<!doctype html><html lang=en><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><meta name=robots content="noindex,nofollow"><title>Local Admin · Anees</title><style>:root{color-scheme:light;--bg:#f7f7f5;--paper:#fff;--ink:#2f3033;--text-muted:#6f7378;--soft:#9a9da2;--line:#e4e4df;--blue:#1f6fb8;--blue-dark:#185f9f;--danger:#9d2d2d;--ok:#2f6b45;--mono:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;--sans:"Helvetica Neue", Helvetica, Arial, sans-serif;--background:var(--bg);--foreground:var(--ink);--card:var(--paper);--card-foreground:var(--ink);--primary:var(--blue);--primary-foreground:#fff;--secondary:#ecece7;--secondary-foreground:var(--ink);--muted:#eeeeea;--muted-foreground:var(--text-muted);--faint:#fbfbf9;--faint-foreground:var(--soft);--accent:#ededeb;--accent-foreground:var(--ink);--danger-foreground:#fff;--success:var(--ok);--success-foreground:#fff;--warning:#a96b18;--warning-foreground:#fff;--border:var(--line);--input:var(--line);--ring:var(--blue);--font-sans:var(--sans);--font-mono:var(--mono);--radius-small:3px;--radius-medium:4px;--radius-large:6px}:root[data-theme=dark]{color-scheme:dark;--bg:#111;--paper:#171717;--ink:#ededed;--text-muted:#b7b7b7;--soft:#868686;--line:#303030;--blue:#8fbce8;--blue-dark:#c8dfff;--danger:#ff8a8a;--ok:#97d2aa;--primary-foreground:#111;--secondary:#252525;--muted:#242424;--faint:#151515;--accent:#282828;--danger-foreground:#111;--success-foreground:#111;--warning:#e6a640;--warning-foreground:#111}*{box-sizing:border-box}body{margin:0;background:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px),var(--bg);background-size:34px 34px;color:var(--ink);font:16px/1.55 var(--sans)}button,input,select,textarea{font:inherit}.shell{width:min(1240px,calc(100vw - 32px));margin:0 auto;padding:28px 0 40px}.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:34px;padding-bottom:18px;border-bottom:1px solid var(--line)}.kicker{margin:0 0 8px;color:var(--soft);font:700 11px/1.3 var(--mono);letter-spacing:.16em;text-transform:uppercase}h1{margin:0;font-size:clamp(42px,8vw,88px);line-height:.95;letter-spacing:0}.subtitle{max-width:680px;margin:18px 0 0;color:var(--text-muted);font-size:20px;font-weight:300}.status{min-width:min(100%,360px);padding:14px 16px;border:1px solid var(--line);background:color-mix(in srgb,var(--paper) 86%,transparent)}.status strong{display:block;margin-bottom:5px;font-size:13px}.status span{display:block;color:var(--text-muted);font:12px/1.45 var(--mono);word-break:break-word}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}.button{display:inline-flex;align-items:center;justify-content:center;min-height:38px;padding:8px 13px;border:1px solid var(--line);border-radius:3px;background:var(--paper);color:var(--ink);cursor:pointer;text-decoration:none}.button:hover{border-color:var(--blue);color:var(--blue)}.button.primary{border-color:var(--blue);background:var(--blue);color:var(--primary-foreground)}.button.primary:hover{background:var(--blue-dark);color:var(--primary-foreground)}.grid{display:grid;grid-template-columns:minmax(300px,.95fr)minmax(360px,1.05fr);gap:22px;align-items:start}.panel{border:1px solid var(--line);background:color-mix(in srgb,var(--paper) 94%,transparent)}.tabs{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--line)}.tab{border:0;border-right:1px solid var(--line);background:0 0;color:var(--text-muted);padding:16px;cursor:pointer;font-weight:700}.tab:last-child{border-right:0}.tab[aria-selected=true]{background:var(--paper);color:var(--ink);box-shadow:inset 0 -2px 0 var(--blue)}.form{display:none;padding:20px}.form.active{display:block}.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{margin-bottom:14px}label{display:block;margin-bottom:6px;color:var(--text-muted);font:700 11px/1.3 var(--mono);letter-spacing:.08em;text-transform:uppercase}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:3px;background:var(--paper);color:var(--ink);padding:11px 12px;outline:none}input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px color-mix(in srgb,var(--blue) 14%,transparent)}input[type=file]{padding:9px 10px;color:var(--text-muted)}textarea{min-height:240px;resize:vertical;font-family:var(--mono);font-size:14px;line-height:1.55}.post-body{min-height:460px}.checkline{display:flex;align-items:center;gap:10px;margin:12px 0 16px;color:var(--text-muted)}.checkline input{width:auto}.hint{margin:6px 0 0;color:var(--soft);font-size:13px}.message{min-height:22px;margin:14px 0 0;color:var(--text-muted);font:500 13px/1.45 var(--mono)}.message.ok{color:var(--ok)}.message.error{color:var(--danger)}.preview-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}.preview-head h2{margin:0;font-size:18px}.preview-mode{color:var(--soft);font:700 11px/1.3 var(--mono);letter-spacing:.12em;text-transform:uppercase}.preview{min-height:690px;padding:28px;background:var(--paper)}.preview .prose{max-width:720px;color:var(--ink)}.prose h1,.prose h2,.prose h3{line-height:1.2}.prose h1{font-size:38px;margin:0 0 18px}.prose h2{margin-top:30px;font-size:24px}.prose p,.prose li{color:var(--text-muted);font-size:17px}.prose code{padding:2px 5px;background:color-mix(in srgb,var(--line) 72%,transparent);border-radius:3px;font-family:var(--mono);font-size:.9em}.prose pre{overflow:auto;padding:16px;border:1px solid var(--line);background:color-mix(in srgb,var(--bg) 80%,var(--paper))}.prose pre code{padding:0;background:0 0}.photo-preview{margin:0}.photo-preview img,.photo-preview video{display:block;width:min(100%,520px);aspect-ratio:1/1;object-fit:cover;filter:grayscale(1);border-radius:4px;background:color-mix(in srgb,var(--line) 55%,transparent)}.photo-preview.is-wide img,.photo-preview.is-wide video{aspect-ratio:4/3}.photo-preview figcaption{margin-top:18px}.photo-preview h3{margin:8px 0 6px;color:var(--ink);font-size:22px;line-height:1.25}.photo-preview time{display:block;margin:0 0 8px;color:var(--soft);font:15px/1.4 var(--sans);text-transform:uppercase}.side{margin-top:22px;padding:18px;border:1px dashed var(--line);background:color-mix(in srgb,var(--paper) 76%,transparent)}.side h2{margin:0 0 12px;font-size:16px}.side ul{margin:0;padding-left:18px;color:var(--text-muted)}.recent{margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}.recent p{margin:8px 0;color:var(--text-muted);font:12px/1.45 var(--mono)}.disabled{max-width:720px;margin:12vh auto 0;padding:28px;border:1px solid var(--line);background:var(--paper)}.disabled h1{font-size:clamp(38px,7vw,72px)}@media(max-width:900px){.topbar,.grid{display:block}.status,.panel+.panel{margin-top:18px}.field-grid{grid-template-columns:1fr}.preview{min-height:360px}}</style></head><body><main class=disabled><p class=kicker>Local only</p><h1>Admin disabled</h1><p class=subtitle>This writing portal only runs through `hugo server` on your own machine.</p></main></body></html>
